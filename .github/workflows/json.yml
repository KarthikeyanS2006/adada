name: Organize Archive Files

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  move-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Organize PDF and JSON Files
        run: |
          # Define the target directory based on your project structure
          TARGET_DIR="Longinsent_Archive/Adda247_SSC/2025/SSC_GD"
          
          # Create the directory if it doesn't exist
          mkdir -p "$TARGET_DIR"
          
          # Find and move PDF files
          # Excludes files already in the target directory and the hidden .github folder
          find . -type f -iname "*.pdf" ! -path "./$TARGET_DIR/*" ! -path "./.github/*" -exec mv -v {} "./$TARGET_DIR/" \;
          
          # If you still want to move JSON files to their own folder:
          mkdir -p "json_files"
          find . -type f -iname "*.json" ! -path "./json_files/*" ! -path "./.github/*" -exec mv -v {} "./json_files/" \;

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .
          
          if git diff --staged --quiet; then
            echo "No changes found to move."
          else
            git commit -m "Automated: Organized PDFs into SSC_GD archive and JSON files"
            git push
          fi
