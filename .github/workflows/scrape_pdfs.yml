name: Adda247 Full Crawler

on:
  schedule:
    - cron: '0 0 * * 0' # Weekly
  workflow_dispatch: 

jobs:
  scrape_and_push:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: pip install requests beautifulsoup4

    - name: Run Crawler
      run: python scraper.py

    - name: Commit and Push Batch
      run: |
        git config --global user.name "Karthikeyan-Bot"
        git config --global user.email "actions@github.com"
        
        mkdir -p Longinsent_Archive
        git add Longinsent_Archive/
        
        if [ -n "$(git status --porcelain)" ]; then
          git commit -m "Crawler Batch: Added new PDF files"
          git push origin main
        else
          echo "No new files found."
        fi
