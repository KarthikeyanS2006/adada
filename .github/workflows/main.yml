name: Full Exam Archive Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Libs
      run: |
        pip install requests beautifulsoup4 pymupdf openai # Use openai here

    - name: Run Scraper & Processor
      run: python scraper.py

    - name: Push to Repo
      run: |
        git config --global user.name "Karthikeyan-Archive-Bot"
        git config --global user.email "bot@longinset.com"
        git add .
        if [ -n "$(git status --porcelain)" ]; then
          git commit -m "Auto-update: Processed new exam PDFs with OpenRouter"
          git push
        else
          echo "No changes."
        fi
