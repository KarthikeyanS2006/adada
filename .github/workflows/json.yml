name: Organize JSON Files

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  move-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Fetches all history so git can push changes back
          fetch-depth: 0

      - name: Create folder and move files
        run: |
          # Create the directory
          mkdir -p "json filees"
          
          # find . -type f : Look for files
          # -iname "*.json" : Case-insensitive (catches .json and .JSON)
          # ! -path "./json filees/*" : Don't move files already in the target
          # ! -path "./.github/*" : Don't move your workflow files
          find . -type f -iname "*.json" ! -path "./json filees/*" ! -path "./.github/*" -exec mv -v {} "./json filees/" \;

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .
          
          # Check if there are actual changes to avoid errors when the repo is already clean
          if git diff --staged --quiet; then
            echo "No changes found to move."
          else
            git commit -m "Automated: Moved all JSON files to 'json filees' folder"
            git push
          fi
