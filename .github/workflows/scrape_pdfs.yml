name: Batch PDF Scraper

on:
  schedule:
    - cron: '0 0 * * 0' # Weekly run
  workflow_dispatch: # Allows you to click "Run workflow" manually

jobs:
  scrape_and_push:
    runs-on: ubuntu-latest
    # Added permissions to ensure the bot can write to the repo
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install Dependencies
      run: pip install requests beautifulsoup4

    - name: Run Scraper (Batch of 80)
      run: python scraper.py

    - name: Commit and Push Batch
      run: |
        git config --global user.name "Karthikeyan-Bot"
        git config --global user.email "actions@github.com"
        git add Longinsent_Archive/
        # Only commit if there are actually new files
        if git diff --staged --quiet; then
          echo "No new files to upload."
        else
          git commit -m "Automated Batch Upload: 80 PDF Files"
          git push origin main
        fi
