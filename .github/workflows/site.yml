name: Batch PDF Scraper

on:
  workflow_dispatch: # Allows you to run it manually from the Actions tab
  schedule:
    - cron: '0 0 * * *' # Optional: Runs automatically every day at midnight

jobs:
  scrape_and_upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Fetches all history so it knows which files already exist

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install requests beautifulsoup4

    - name: Run Scraper
      run: python site.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # This adds ALL new folders (SSC_GD, SSC_CGL, etc.) automatically
        git add .
        
        # Check if there are actually new files to avoid 'nothing to commit' errors
        if git diff --cached --quiet; then
          echo "No new PDFs found in this batch."
        else
          git commit -m "Automated Batch: Added 50 new exam PDFs"
          git push
        fi
